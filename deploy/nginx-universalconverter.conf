# /etc/nginx/sites-available/universalconverter
# Vhost universalconverter.heiphaistos.org → backend axum 127.0.0.1:3003

server {
    listen 80;
    listen [::]:80;
    server_name universalconverter.heiphaistos.org;

    # Taille max upload (le backend limite à 60 MB, marge ici)
    client_max_body_size 70m;

    proxy_buffering off;

    location / {
        proxy_pass http://127.0.0.1:3003;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 150s;
        proxy_send_timeout 150s;
    }
}
