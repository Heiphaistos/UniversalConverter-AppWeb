# /etc/nginx/sites-available/universalconverter-app
# Vhost universalconverter-app.heiphaistos.org → backend axum 127.0.0.1:3003

# Redirect HTTP → HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name universalconverter-app.heiphaistos.org;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name universalconverter-app.heiphaistos.org;

    # Certificat Let's Encrypt (certbot)
    ssl_certificate     /etc/letsencrypt/live/universalconverter-app.heiphaistos.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/universalconverter-app.heiphaistos.org/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # En-têtes de sécurité
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options    "nosniff" always;
    add_header X-Frame-Options           "DENY" always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;

    # Taille max upload (le backend limite à 60 MB, marge ici)
    client_max_body_size 70m;

    proxy_buffering off;

    location / {
        proxy_pass http://127.0.0.1:3003;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 150s;
        proxy_send_timeout 150s;
    }
}
